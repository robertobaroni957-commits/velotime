# Configurazione Supabase Locale Corretta per VeloTime
project_id = "velotime"

[api]
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["http://localhost:5173/strava-callback"]
jwt_expiry = 3600
enable_signup = true

[auth.external.strava]
enabled = true
client_id = "env(STRAVA_CLIENT_ID)"
secret = "env(STRAVA_CLIENT_SECRET)"
redirect_uri = "http://127.0.0.1:54321/auth/v1/callback"

[storage]
enabled = true
file_size_limit = "5MiB"

[realtime]
enabled = true

[edge_runtime]
enabled = true

[analytics]
enabled = false

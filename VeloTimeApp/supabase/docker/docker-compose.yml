version: '3.8'

services:
  db:
    container_name: supabase_db_velotime
    image: supabase/postgres:15.1.0.117
    ports:
      - 54322:5432
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - ../volumes/db/data:/var/lib/postgresql/data

  auth:
    container_name: supabase_auth_velotime
    image: supabase/gotrue:v2.132.3
    depends_on:
      - db
    ports:
      - 54324:9999
    environment:
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://supabase_auth_admin:postgres@db:5432/postgres?sslmode=disable

  rest:
    container_name: supabase_rest_velotime
    image: postgrest/postgrest:v10.1.1
    depends_on:
      - db
    ports:
      - 54325:3000

  kong:
    container_name: supabase_kong_velotime
    image: kong:2.8.1
    ports:
      - 54321:8000
      - 54326:8001
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /var/lib/kong/kong.yml

  studio:
    container_name: supabase_studio_velotime
    image: supabase/studio:20240101-1
    ports:
      - 54323:3000
    environment:
      SUPABASE_URL: http://kong:8000
